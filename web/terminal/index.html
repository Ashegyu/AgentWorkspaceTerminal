<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agent Workspace Terminal</title>
  <link rel="stylesheet" href="vendor/xterm.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b0e14;
      overflow: hidden;
      font-family: 'Cascadia Code', 'Cascadia Mono', Consolas, 'Lucida Console', monospace;
    }
    #app {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
    }
    #pane-root {
      flex: 1;
      position: relative;
    }
    /* Each pane absolutely-positioned by JS using ratios from the layout tree. */
    .pane {
      position: absolute;
      inset: 0;
      box-sizing: border-box;
      padding: 4px 6px;
    }
    .pane.is-focused {
      outline: 1px solid #79c0ff;
      outline-offset: -2px;
    }
    /* Hide all but the focused pane's xterm scrollbars to keep things tidy. */
    .pane .xterm-viewport { background: transparent !important; }
    /* Per-pane provider badge — absolute overlay in the top-right corner. */
    .pane-badge {
      position: absolute;
      top: 6px;
      right: 8px;
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 10px;
      line-height: 16px;
      background: rgba(11, 14, 20, 0.82);
      color: #9ba3af;
      border: 1px solid #2a3040;
      pointer-events: none;
      z-index: 10;
      user-select: none;
      display: none;
    }
    .pane-badge[data-provider="claude"] { color: #f78166; border-color: rgba(247,129,102,0.5); }
    .pane-badge[data-provider="ollama"] { color: #56d364; border-color: rgba(86,211,100,0.5); }
    #status {
      flex: 0 0 auto;
      padding: 2px 8px;
      background: #11141b;
      color: #9ba3af;
      font-size: 11px;
      border-top: 1px solid #1f2530;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="pane-root"></div>
    <div id="status">Initialising&hellip;</div>
  </div>

  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
  <script src="vendor/addon-web-links.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
