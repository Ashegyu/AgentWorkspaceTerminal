<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agent Workspace Terminal</title>
  <link rel="stylesheet" href="https://unpkg.com/xterm@5.5.0/css/xterm.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b0e14;
      overflow: hidden;
      font-family: 'Cascadia Code', 'Cascadia Mono', Consolas, 'Lucida Console', monospace;
    }
    #app {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
    }
    .pane-container {
      flex: 1;
      position: relative;
      padding: 4px 6px;
    }
    .pane {
      width: 100%;
      height: 100%;
    }
    #status {
      flex: 0 0 auto;
      padding: 2px 8px;
      background: #11141b;
      color: #9ba3af;
      font-size: 11px;
      border-top: 1px solid #1f2530;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="pane-container"><div id="pane" class="pane"></div></div>
    <div id="status">Initialising&hellip;</div>
  </div>

  <!-- xterm + addons via UMD bundles. -->
  <script src="https://unpkg.com/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://unpkg.com/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="https://unpkg.com/@xterm/addon-web-links@0.11.0/lib/addon-web-links.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
